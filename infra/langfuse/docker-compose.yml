# Local Langfuse v2 self-host (architecture.md §10).
#
# `make langfuse-up` brings this up. Postgres holds traces; the langfuse
# server exposes the UI on :3000 and the ingest API used by the LiteLLM
# callback. Both containers are throwaway — wiping the named volume below
# resets all traces.

name: releaselens-langfuse

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langfuse"]
      interval: 5s
      timeout: 3s
      retries: 20

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set in .env}
      SALT: ${SALT:?set in .env}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      LANGFUSE_DEFAULT_PROJECT_ID: releaselens
      LANGFUSE_DEFAULT_PROJECT_ROLE: ADMIN

volumes:
  langfuse_pg:
